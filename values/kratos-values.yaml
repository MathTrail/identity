# Ory Kratos - Identity Management
# Local development configuration

kratos:
  config:
    dsn: "postgres://mathtrail:mathtrail@identity-postgres-pgbouncer.identity:6432/kratos?sslmode=disable"

    serve:
      public:
        base_url: http://localhost/api/kratos/
        cors:
          enabled: true
          allowed_origins:
            - https://mathtrail.localhost
            - http://localhost
          allow_credentials: true
      admin:
        base_url: http://kratos-admin:4434/

    cookies:
      # Explicitly set cookie domain to mathtrail.localhost (not localhost).
      # base_url uses localhost so Google accepts the redirect_uri via loopback
      # exception, but without this override Kratos would set Domain=localhost
      # which Chrome rejects (localhost is a PSL TLD).
      domain: mathtrail.localhost
      same_site: Lax

    selfservice:
      default_browser_return_url: https://mathtrail.localhost/auth/login
      allowed_return_urls:
        - https://mathtrail.localhost
        - http://localhost

      methods:
        password:
          enabled: false
        oidc:
          enabled: true
          config:
            providers:
              # Credentials are injected by kratos-oidc-config secret (ESO template)
              # mounted as a second --config file via deployment.extraArgs.
              # Kratos v25.4.0 does not support ${VAR} substitution for OIDC fields.
              # This entry satisfies schema validation; the second config replaces it.
              - id: google
                provider: google
                client_id: "pending"
                client_secret: "pending"
                mapper_url: file:///etc/config/kratos/oidc.google.jsonnet
                scope:
                  - openid
                  - email
                  - profile

      flows:
        login:
          ui_url: https://mathtrail.localhost/auth/login
          after:
            default_browser_return_url: https://mathtrail.localhost/auth/login
        registration:
          ui_url: https://mathtrail.localhost/auth/registration
          after:
            # Hook runs ONLY on registration (first sign-in), not on subsequent logins.
            # This ensures the Kafka onboarding event fires exactly once per account.
            oidc:
              hooks:
                - hook: session
        error:
          ui_url: https://mathtrail.localhost/auth/error
        recovery:
          enabled: true
          ui_url: https://mathtrail.localhost/auth/recovery
        verification:
          enabled: true
          ui_url: https://mathtrail.localhost/auth/verification

    identity:
      default_schema_id: mathtrail-user
      schemas:
        - id: mathtrail-user
          url: file:///etc/config/identity.schema.json

    log:
      level: info

  identitySchemas:
    "identity.schema.json": |
      {
        "$id": "https://schemas.mathtrail.io/v1/user.schema.json",
        "$schema": "http://json-schema.org/draft-07/schema#",
        "title": "MathTrail User Identity",
        "type": "object",
        "properties": {
          "traits": {
            "type": "object",
            "properties": {
              "email": {
                "type": "string",
                "format": "email",
                "title": "E-Mail",
                "ory.sh/kratos": {
                  "recovery": { "via": "email" },
                  "verification": { "via": "email" }
                }
              },
              "name": {
                "type": "object",
                "properties": {
                  "first": { "type": "string", "title": "First Name" },
                  "last": { "type": "string", "title": "Last Name" }
                }
              },
              "role": {
                "type": "string",
                "enum": ["parent", "student", "teacher", "admin", "mentor"],
                "title": "Platform Role",
                "description": "Primary role of the user within MathTrail"
              }
            },
            "required": ["email"],
            "additionalProperties": false
          }
        }
      }

  # dev mode disables CSRF checks — required because the OIDC callback comes
  # from http://localhost (Google's loopback exception) while the SPA lives on
  # https://mathtrail.localhost. Without --dev, Kratos rejects the flow fetch
  # due to origin mismatch → infinite redirect.
  development: true

  automigration:
    enabled: true
    type: job

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

deployment:
  # Pass kratos-oidc-config as a second --config file.
  # ESO generates this secret with real Google credentials via template interpolation.
  # The second config overrides selfservice.methods.oidc.config.providers from the main config.
  extraArgs:
    - --config
    - /etc/kratos-oidc/oidc.yaml
  extraVolumes:
    - name: kratos-oidc-mappers
      configMap:
        name: kratos-oidc-mappers
    - name: kratos-oidc-config
      secret:
        secretName: kratos-oidc-config
  extraVolumeMounts:
    - name: kratos-oidc-mappers
      mountPath: /etc/config/kratos
      readOnly: true
    - name: kratos-oidc-config
      mountPath: /etc/kratos-oidc
      readOnly: true
