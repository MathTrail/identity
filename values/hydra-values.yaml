# Ory Hydra - OAuth2/OIDC Token Issuer
# Local development configuration

# secret.enabled=false + nameOverride: Hydra reads SECRETS_SYSTEM, SECRETS_COOKIE, and DSN
# from the K8s Secret named 'hydra-external-secret', created by ESO from Vault.
# This prevents the chart from generating a new random SECRETS_SYSTEM on every helm upgrade,
# which would invalidate the signing keys stored in the database.
secret:
  enabled: false
  nameOverride: hydra-external-secret

hydra:
  config:
    # dsn is intentionally omitted here — loaded from hydra-external-secret via env.
    # When secret.enabled=false + nameOverride is set, the chart uses 'dsn-loaded-from-env'.

    serve:
      public:
        cors:
          enabled: true
      cookies:
        same_site_mode: Lax

    urls:
      self:
        issuer: https://mathtrail.localhost
      login: https://mathtrail.localhost/auth/login
      consent: https://mathtrail.localhost/auth/consent
      logout: https://mathtrail.localhost/auth/logout

    oidc:
      subject_identifiers:
        supported_types:
          - public

    log:
      level: info

  dev: true

  automigration:
    enabled: true
    type: job

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
