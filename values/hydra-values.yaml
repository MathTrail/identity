# Ory Hydra - OAuth2/OIDC Token Issuer
# Local development configuration

hydra:
  config:
    dsn: "postgres://mathtrail:mathtrail@postgres-pgbouncer.mathtrail:6432/hydra?sslmode=disable"

    serve:
      public:
        cors:
          enabled: true

    urls:
      self:
        issuer: http://localhost:4444
      login: http://localhost:8090/auth/login
      consent: http://localhost:8090/auth/consent
      logout: http://localhost:8090/auth/logout

    oidc:
      subject_identifiers:
        supported_types:
          - public

    log:
      level: info

  # Secrets managed externally via Vault KV + ExternalSecret.
  # ExternalSecret 'hydra-external-secret' in namespace mathtrail creates the K8s Secret.
  secret:
    enabled: false
    nameOverride: hydra-external-secret

  automigration:
    enabled: true
    type: job

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
