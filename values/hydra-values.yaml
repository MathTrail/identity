# Ory Hydra - OAuth2/OIDC Token Issuer
# Local development configuration

hydra:
  config:
    dsn: "postgres://mathtrail:mathtrail@identity-postgres-pgbouncer.identity:6432/hydra?sslmode=disable"

    serve:
      public:
        cors:
          enabled: true
      cookies:
        same_site_mode: Lax

    urls:
      self:
        issuer: https://mathtrail.localhost
      login: https://mathtrail.localhost/auth/login
      consent: https://mathtrail.localhost/auth/consent
      logout: https://mathtrail.localhost/auth/logout

    oidc:
      subject_identifiers:
        supported_types:
          - public

    log:
      level: info

  # Secrets managed externally via Vault KV + ExternalSecret.
  # ExternalSecret 'hydra-external-secret' in namespace mathtrail creates the K8s Secret.
  secret:
    enabled: false
    nameOverride: hydra-external-secret

  dev: true

  automigration:
    enabled: true
    type: job

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
