# Ory Oathkeeper - Zero Trust Identity & Access Proxy
# Local development configuration

oathkeeper:
  config:
    authenticators:
      cookie_session:
        enabled: true
        config:
          check_session_url: http://kratos-public/sessions/whoami
          preserve_path: true
          extra_from: "@this"
          subject_from: "identity.id"
          force_method: GET
          only:
            - ory_kratos_session
      bearer_token:
        enabled: true
        config:
          check_session_url: http://kratos-public/sessions/whoami
          preserve_path: true
          extra_from: "@this"
          subject_from: "identity.id"
          force_method: GET
      anonymous:
        enabled: true
      noop:
        enabled: true

    authorizers:
      remote_json:
        enabled: true
        config:
          remote: http://keto-read/relation-tuples/check
          payload: |
            {
              "namespace": "ClassGroup",
              "object": "{{ print .MatchContext.RegexpCaptureGroups }}",
              "relation": "members",
              "subject_id": "{{ print .Subject }}"
            }
      allow:
        enabled: true

    mutators:
      header:
        enabled: true
        config:
          headers:
            X-User-ID: "{{ print .Subject }}"
      noop:
        enabled: true

    serve:
      proxy:
        port: 4455
      api:
        port: 4456

    access_rules:
      repositories:
        - file:///etc/rules/access-rules.json

    log:
      level: info

  accessRules: |
    - id: "mathtrail-health-rule"
      upstream:
        url: "http://identity-ui:8080"
      match:
        methods: ["GET"]
        url: "<http|https>://mathtrail.localhost/health/<.*>"
      authenticators:
        - handler: noop
      authorizer:
        handler: allow
      mutators:
        - handler: noop

    - id: "mathtrail-assets-rule"
      upstream:
        url: "http://identity-ui:8080"
      match:
        methods: ["GET"]
        url: "<http|https>://mathtrail.localhost/assets/<.*>"
      authenticators:
        - handler: anonymous
      authorizer:
        handler: allow
      mutators:
        - handler: noop

    - id: "mathtrail-auth-ui-rule"
      upstream:
        url: "http://identity-ui:8080"
      match:
        methods: ["GET", "POST"]
        url: "<http|https>://mathtrail.localhost/auth/<.*>"
      authenticators:
        - handler: anonymous
      authorizer:
        handler: allow
      mutators:
        - handler: noop

    - id: "mathtrail-mentor-swagger-rule"
      upstream:
        url: "http://mentor-api.mathtrail.svc.cluster.local:8080"
        strip_path: "/swagger/mentor"
      match:
        methods: ["GET"]
        url: "<http|https>://mathtrail.localhost/swagger/mentor/<.*>"
      authenticators:
        - handler: cookie_session
      authorizer:
        handler: allow
      mutators:
        - handler: noop

    - id: "mathtrail-api-rule"
      upstream:
        url: "http://mentor-api.mathtrail.svc.cluster.local:8080"
      match:
        methods: ["GET", "POST", "PUT", "DELETE"]
        url: "<http|https>://mathtrail.localhost/api/<.*>"
      authenticators:
        - handler: cookie_session
        - handler: bearer_token
      authorizer:
        handler: allow
      mutators:
        - handler: header

    - id: "mathtrail-kafka-ui-assets-rule"
      upstream:
        url: "http://streaming-kafka-ui.streaming.svc.cluster.local:8080"
      match:
        methods: ["GET"]
        url: "<http|https>://mathtrail.localhost/observability/kafka-ui/<assets|fonts|favicon|manifest.json><.*>"
      authenticators:
        - handler: anonymous
      authorizer:
        handler: allow
      mutators:
        - handler: noop

    - id: "mathtrail-kafka-ui-rule"
      upstream:
        url: "http://streaming-kafka-ui.streaming.svc.cluster.local:8080"
      match:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        url: "<http|https>://mathtrail.localhost/observability/kafka-ui<|/|/ui/.*|/api/.*|/actuator/.*>"
      authenticators:
        - handler: cookie_session
      authorizer:
        handler: remote_json
        config:
          remote: http://keto-read/relation-tuples/check
          payload: |
            {
              "namespace": "Monitoring",
              "object": "ui",
              "relation": "viewer",
              "subject_id": "{{ print .Subject }}"
            }
      mutators:
        - handler: noop

    - id: "mathtrail-apicurio-rule"
      upstream:
        url: "http://streaming-apicurio-apicurio-registry.streaming.svc.cluster.local:8080"
        strip_path: "/observability/apicurio"
      match:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        url: "<http|https>://mathtrail.localhost/observability/apicurio<.*>"
      authenticators:
        - handler: cookie_session
      authorizer:
        handler: remote_json
        config:
          remote: http://keto-read/relation-tuples/check
          payload: |
            {
              "namespace": "Monitoring",
              "object": "ui",
              "relation": "viewer",
              "subject_id": "{{ print .Subject }}"
            }
      mutators:
        - handler: noop

    # Apicurio raw-path rules: Apicurio HTML has <base href="/"> so relative links
    # resolve at root (/apis/..., /resources/...) rather than under /observability/apicurio/.
    - id: "mathtrail-apicurio-apis-rule"
      upstream:
        url: "http://streaming-apicurio-apicurio-registry.streaming.svc.cluster.local:8080"
      match:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        url: "<http|https>://mathtrail.localhost/apis<.*>"
      authenticators:
        - handler: cookie_session
      authorizer:
        handler: remote_json
        config:
          remote: http://keto-read/relation-tuples/check
          payload: |
            {
              "namespace": "Monitoring",
              "object": "ui",
              "relation": "viewer",
              "subject_id": "{{ print .Subject }}"
            }
      mutators:
        - handler: noop

    - id: "mathtrail-apicurio-resources-rule"
      upstream:
        url: "http://streaming-apicurio-apicurio-registry.streaming.svc.cluster.local:8080"
      match:
        methods: ["GET"]
        url: "<http|https>://mathtrail.localhost/resources<.*>"
      authenticators:
        - handler: anonymous
      authorizer:
        handler: allow
      mutators:
        - handler: noop

    - id: "mathtrail-apicurio-specs-rule"
      upstream:
        url: "http://streaming-apicurio-apicurio-registry.streaming.svc.cluster.local:8080"
      match:
        methods: ["GET"]
        url: "<http|https>://mathtrail.localhost/api-specifications<.*>"
      authenticators:
        - handler: anonymous
      authorizer:
        handler: allow
      mutators:
        - handler: noop

    - id: "mathtrail-eventcatalog-rule"
      upstream:
        url: "http://streaming-eventcatalog-eventcatalog-local.streaming.svc.cluster.local:8080"
        preserve_host: true
      match:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        url: "<http|https>://mathtrail.localhost/observability/eventcatalog<.*>"
      authenticators:
        - handler: cookie_session
      authorizer:
        handler: remote_json
        config:
          remote: http://keto-read/relation-tuples/check
          payload: |
            {
              "namespace": "Monitoring",
              "object": "ui",
              "relation": "viewer",
              "subject_id": "{{ print .Subject }}"
            }
      mutators:
        - handler: noop

    # MinIO Console lives on its own subdomain to avoid /api/v1 conflict with mentor-api.
    # The /observability/minio path redirects here via Traefik redirect-minio-subdomain middleware.
    - id: "mathtrail-minio-rule"
      upstream:
        url: "http://streaming-minio-console.streaming.svc.cluster.local:9001"
      match:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        url: "<http|https>://minio.mathtrail.localhost<.*>"
      authenticators:
        - handler: cookie_session
      authorizer:
        handler: remote_json
        config:
          remote: http://keto-read/relation-tuples/check
          payload: |
            {
              "namespace": "Monitoring",
              "object": "ui",
              "relation": "viewer",
              "subject_id": "{{ print .Subject }}"
            }
      mutators:
        - handler: noop

    # RisingWave static assets — anonymous (/_next/static/... chunks).
    # Bypasses Keto to prevent connection saturation when ~20 JS chunks load in parallel.
    # /risingwave.svg is NOT here — it's only requested on authenticated pages, so the
    # main rule handles it. Patterns must be mutually exclusive with mathtrail-risingwave-rule.
    - id: "mathtrail-risingwave-assets-rule"
      upstream:
        url: "http://risingwave-frontend-meta-headless.streaming.svc.cluster.local:5691"
      match:
        methods: ["GET"]
        url: "<http|https>://risingwave.mathtrail.localhost</_next/.*>"
      authenticators:
        - handler: anonymous
      authorizer:
        handler: allow
      mutators:
        - handler: noop

    # RisingWave Dashboard — served on risingwave.mathtrail.localhost subdomain.
    # Next.js SPA uses root-relative paths; subdomain gives it its own origin.
    # Pattern excludes /_next/ paths (handled by mathtrail-risingwave-assets-rule above).
    - id: "mathtrail-risingwave-rule"
      upstream:
        url: "http://risingwave-frontend-meta-headless.streaming.svc.cluster.local:5691"
      match:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        url: "<http|https>://risingwave.mathtrail.localhost<|/|/[^_].*>"
      authenticators:
        - handler: cookie_session
      authorizer:
        handler: remote_json
        config:
          remote: http://keto-read/relation-tuples/check
          payload: |
            {
              "namespace": "Monitoring",
              "object": "ui",
              "relation": "viewer",
              "subject_id": "{{ print .Subject }}"
            }
      mutators:
        - handler: noop

    - id: "mathtrail-grafana-rule"
      upstream:
        url: "http://lgtm-grafana.monitoring.svc.cluster.local:80"
        strip_path: "/observability/grafana"
      match:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        url: "<http|https>://mathtrail.localhost/observability/grafana/<.*>"
      authenticators:
        - handler: cookie_session
      authorizer:
        handler: remote_json
        config:
          remote: http://keto-read/relation-tuples/check
          payload: |
            {
              "namespace": "Monitoring",
              "object": "ui",
              "relation": "viewer",
              "subject_id": "{{ print .Subject }}"
            }
      mutators:
        - handler: header
          config:
            headers:
              X-Webauth-User: "{{ print .Extra.identity.traits.email }}"
              X-User-ID: "{{ print .Subject }}"
              X-Webauth-Role: "{{ if or (eq .Extra.identity.traits.role \"admin\") (eq .Extra.identity.traits.role \"mentor\") }}Admin{{ else if eq .Extra.identity.traits.role \"teacher\" }}Editor{{ else }}Viewer{{ end }}"

    - id: "mathtrail-pyroscope-rule"
      upstream:
        url: "http://pyroscope.monitoring.svc.cluster.local:4040"
        strip_path: "/observability/pyroscope"
      match:
        methods: ["GET", "POST"]
        url: "<http|https>://mathtrail.localhost/observability/pyroscope/<.*>"
      authenticators:
        - handler: cookie_session
      authorizer:
        handler: remote_json
        config:
          remote: http://keto-read/relation-tuples/check
          payload: |
            {
              "namespace": "Monitoring",
              "object": "ui",
              "relation": "viewer",
              "subject_id": "{{ print .Subject }}"
            }
      mutators:
        - handler: header
          config:
            headers:
              X-User-ID: "{{ print .Subject }}"

    - id: "mathtrail-argocd-rule"
      upstream:
        url: "http://argocd-server.argocd.svc.cluster.local:80"
      match:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        url: "<http|https>://argocd.mathtrail.localhost<.*>"
      authenticators:
        - handler: cookie_session
      authorizer:
        handler: remote_json
        config:
          remote: http://keto-read/relation-tuples/check
          payload: |
            {
              "namespace": "Monitoring",
              "object": "ui",
              "relation": "viewer",
              "subject_id": "{{ print .Subject }}"
            }
      mutators:
        - handler: noop

    - id: "mathtrail-identity-kratos-admin-rule"
      upstream:
        url: "http://kratos-admin"
        strip_path: "/identity/kratos"
      match:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        url: "<http|https>://mathtrail.localhost/identity/kratos<|/|/.*>"
      authenticators:
        - handler: cookie_session
      authorizer:
        handler: remote_json
        config:
          remote: http://keto-read/relation-tuples/check
          payload: |
            {
              "namespace": "Identity",
              "object": "admin",
              "relation": "viewer",
              "subject_id": "{{ print .Subject }}"
            }
      mutators:
        - handler: noop

    - id: "mathtrail-identity-hydra-admin-rule"
      upstream:
        url: "http://hydra-admin:4445"
        strip_path: "/identity/hydra"
      match:
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        url: "<http|https>://mathtrail.localhost/identity/hydra<|/|/.*>"
      authenticators:
        - handler: cookie_session
      authorizer:
        handler: remote_json
        config:
          remote: http://keto-read/relation-tuples/check
          payload: |
            {
              "namespace": "Identity",
              "object": "admin",
              "relation": "viewer",
              "subject_id": "{{ print .Subject }}"
            }
      mutators:
        - handler: noop

    - id: "mathtrail-identity-keto-read-rule"
      upstream:
        url: "http://keto-read"
        strip_path: "/identity/keto"
      match:
        methods: ["GET", "POST"]
        url: "<http|https>://mathtrail.localhost/identity/keto<|/|/.*>"
      authenticators:
        - handler: cookie_session
      authorizer:
        handler: remote_json
        config:
          remote: http://keto-read/relation-tuples/check
          payload: |
            {
              "namespace": "Identity",
              "object": "admin",
              "relation": "viewer",
              "subject_id": "{{ print .Subject }}"
            }
      mutators:
        - handler: noop

    - id: "mathtrail-identity-oathkeeper-api-rule"
      upstream:
        url: "http://oathkeeper-api:4456"
        strip_path: "/identity/oathkeeper"
      match:
        methods: ["GET"]
        url: "<http|https>://mathtrail.localhost/identity/oathkeeper<|/|/.*>"
      authenticators:
        - handler: cookie_session
      authorizer:
        handler: remote_json
        config:
          remote: http://keto-read/relation-tuples/check
          payload: |
            {
              "namespace": "Identity",
              "object": "admin",
              "relation": "viewer",
              "subject_id": "{{ print .Subject }}"
            }
      mutators:
        - handler: noop

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
