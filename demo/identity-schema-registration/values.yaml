# =======================================================================
# identity-schema-registration :: values.yaml
# Registers Protobuf schemas produced by the identity domain into Apicurio Registry.
# Source of truth for schema definitions: contracts/proto/students/v1/events.proto
# =======================================================================

apicurioUrl: "http://streaming-apicurio-apicurio-registry.streaming.svc.cluster.local:8080"
hookWeight: "8"

schemas:
  - subject: "students.onboarding.ready-value"
    # Source: contracts/proto/students/v2/events.proto
    # Produced by: RisingWave CDC sink (topic: students.onboarding.ready)
    # Consumed by: mentor-api
    # NOTE: must match `message = 'students.v2.StudentOnboardingReady'` in CREATE SINK
    proto: |
      syntax = "proto3";
      package students.v2;
      option go_package = "github.com/mathtrail/contracts/gen/go/students/v2;studentsv2";
      message StudentOnboardingReady {
        string event_id    = 1;
        string user_id     = 2;
        string email       = 3;
        string first_name  = 4;
        string last_name   = 5;
        string role        = 6;
        string occurred_at = 7;
        string schema_id   = 8;
      }
