server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Health endpoints required by mathtrail-service-lib
    location /health/startup  { return 200 '{"status":"started"}'; add_header Content-Type application/json; }
    location /health/liveness { return 200 '{"status":"ok"}';      add_header Content-Type application/json; }
    location /health/ready    { return 200 '{"status":"ready"}';   add_header Content-Type application/json; }

    # Reverse proxy to Kratos — same-origin for cookies
    # Service exposes port 80 (targetPort → http-public/4433 on the pod)
    location /api/kratos/ {
        proxy_pass http://kratos-public/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hydra Admin API — login/consent/logout endpoints only, not full client management
    # rewrite strips /api/hydra-admin prefix; proxy_pass without URI avoids runtime DNS resolution.
    location ~ ^/api/hydra-admin/admin/oauth2/auth/requests/(login|consent|logout) {
        rewrite ^/api/hydra-admin(.+)$ $1 break;
        proxy_pass http://hydra-admin:4445;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all /auth/* routes handled by React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
