# Ory Oathkeeper - Access Rules Reference
# These rules are embedded in values/oathkeeper-values.yaml for deployment.
# This file serves as the authoritative source for documentation.

# Health endpoints - no authentication needed
- id: "mathtrail-health-rule"
  upstream:
    url: "http://identity-ui:8080"
  match:
    methods: ["GET"]
    url: "<http|https>://mathtrail.localhost/health/<.*>"
  authenticators:
    - handler: noop
  authorizer:
    handler: allow
  mutators:
    - handler: noop

# Auth UI - anonymous access (login/registration forms)
- id: "mathtrail-auth-ui-rule"
  upstream:
    url: "http://identity-ui:8080"
  match:
    methods: ["GET", "POST"]
    url: "<http|https>://mathtrail.localhost/auth/<.*>"
  authenticators:
    - handler: anonymous
  authorizer:
    handler: allow
  mutators:
    - handler: noop

# Swagger UI - cookie session required (browser access)
- id: "mathtrail-mentor-swagger-rule"
  upstream:
    url: "http://mentor-api.mathtrail.svc.cluster.local:8080"
    strip_path: "/swagger/mentor"
  match:
    methods: ["GET"]
    url: "<http|https>://mathtrail.localhost/swagger/mentor/<.*>"
  authenticators:
    - handler: cookie_session
  authorizer:
    handler: allow
  mutators:
    - handler: noop

# API endpoints - cookie session or bearer token, X-User-ID injected
- id: "mathtrail-api-rule"
  upstream:
    url: "http://mentor-api.mathtrail.svc.cluster.local:8080"
  match:
    methods: ["GET", "POST", "PUT", "DELETE"]
    url: "<http|https>://mathtrail.localhost/api/<.*>"
  authenticators:
    - handler: cookie_session
    - handler: bearer_token
  authorizer:
    handler: allow
  mutators:
    - handler: header

# Mentor service - authenticated access with ReBAC check
- id: "mathtrail-mentor-rule"
  upstream:
    url: "http://mentor-api.mathtrail.svc.cluster.local:8080"
  match:
    methods: ["GET", "POST"]
    url: "<http|https>://mathtrail.localhost/mentor/<.*>"
  authenticators:
    - handler: bearer_token
  authorizers:
    - handler: remote_json
      config:
        remote: http://keto-read/relation-tuples/check
  mutators:
    - handler: header
      config:
        headers:
          X-User-ID: "{{ print .Subject }}"
          X-User-Role: "{{ print .Extra.role }}"

# Kafka UI static assets - anonymous (manifest.json, fonts, favicon, JS/CSS bundles)
- id: "mathtrail-kafka-ui-assets-rule"
  upstream:
    url: "http://streaming-kafka-ui.streaming.svc.cluster.local:8080"
  match:
    methods: ["GET"]
    url: "<http|https>://mathtrail.localhost/observability/kafka-ui/<assets|fonts|favicon|manifest.json><.*>"
  authenticators:
    - handler: anonymous
  authorizer:
    handler: allow
  mutators:
    - handler: noop

# Kafka UI - cookie session + Keto monitoring:ui#viewer check
# Pattern matches only dynamic paths (root, /ui/*, /api/*, /actuator/*).
# Static assets (/assets/*, /fonts/*, /favicon/*, /manifest.json) are handled
# by mathtrail-kafka-ui-assets-rule above — patterns must be mutually exclusive
# because Oathkeeper errors if more than one rule matches a request.
- id: "mathtrail-kafka-ui-rule"
  upstream:
    url: "http://streaming-kafka-ui.streaming.svc.cluster.local:8080"
  match:
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    url: "<http|https>://mathtrail.localhost/observability/kafka-ui<|/|/ui/.*|/api/.*|/actuator/.*>"
  authenticators:
    - handler: cookie_session
  authorizer:
    handler: remote_json
    config:
      remote: http://keto-read/relation-tuples/check
      payload: |
        {
          "namespace": "Monitoring",
          "object": "ui",
          "relation": "viewer",
          "subject_id": "{{ print .Subject }}"
        }
  mutators:
    - handler: noop

# Apicurio Schema Registry - cookie session + Keto monitoring:ui#viewer check
# strip_path required: Apicurio 3.x ignores QUARKUS_HTTP_ROOT_PATH, always serves at /
# Root path redirect (/ → /apis) handled by Traefik redirect-apicurio-root middleware
# to avoid Apicurio generating absolute redirects with cluster-internal hostname.
- id: "mathtrail-apicurio-rule"
  upstream:
    url: "http://streaming-apicurio-apicurio-registry.streaming.svc.cluster.local:8080"
    strip_path: "/observability/apicurio"
  match:
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    url: "<http|https>://mathtrail.localhost/observability/apicurio<.*>"
  authenticators:
    - handler: cookie_session
  authorizer:
    handler: remote_json
    config:
      remote: http://keto-read/relation-tuples/check
      payload: |
        {
          "namespace": "Monitoring",
          "object": "ui",
          "relation": "viewer",
          "subject_id": "{{ print .Subject }}"
        }
  mutators:
    - handler: noop

# Apicurio raw-path rules: Apicurio HTML has <base href="/"> so relative links
# resolve at root (/apis/..., /resources/...) rather than under /observability/apicurio/.
- id: "mathtrail-apicurio-apis-rule"
  upstream:
    url: "http://streaming-apicurio-apicurio-registry.streaming.svc.cluster.local:8080"
  match:
    methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
    url: "<http|https>://mathtrail.localhost/apis<.*>"
  authenticators:
    - handler: cookie_session
  authorizer:
    handler: remote_json
    config:
      remote: http://keto-read/relation-tuples/check
      payload: |
        {
          "namespace": "Monitoring",
          "object": "ui",
          "relation": "viewer",
          "subject_id": "{{ print .Subject }}"
        }
  mutators:
    - handler: noop

- id: "mathtrail-apicurio-resources-rule"
  upstream:
    url: "http://streaming-apicurio-apicurio-registry.streaming.svc.cluster.local:8080"
  match:
    methods: ["GET"]
    url: "<http|https>://mathtrail.localhost/resources<.*>"
  authenticators:
    - handler: anonymous
  authorizer:
    handler: allow
  mutators:
