apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: mathtrail-identity

build:
  local:
    push: true
    tryImportMissing: false
  insecureRegistries:
    - ${REGISTRY}
  artifacts:
    - image: identity-ui
      custom:
        buildCommand: buildah bud --tag $IMAGE . && buildah push --tls-verify=false $IMAGE
        dependencies:
          paths:
            - identity-ui/
            - Dockerfile

manifests:
  rawYaml:
    - manifests/network-policies.yaml

deploy:
  kubectl:
    defaultNamespace: "{{.IDENTITY_NAMESPACE}}"
  helm:
    releases:
      # --- Gateway: TLS cert + IngressRoute + middlewares (all in identity namespace) ---
      - name: identity-gateway
        chartPath: infra/helm/identity-gateway
        namespace: "{{.IDENTITY_NAMESPACE}}"
        createNamespace: true
        wait: true

      # --- Database initialisation (must run before Ory services) ---
      - name: identity-db-init
        chartPath: infra/helm/identity-db-init
        namespace: "{{.IDENTITY_NAMESPACE}}"
        createNamespace: true
        wait: true
        skipBuildDependencies: true
        setValues:
          db.postgresHost: identity-postgres-postgresql

      # --- Schema registration (runs after DB init, before Ory services) ---
      - name: identity-schema-registration
        repo: "{{.CHARTS_REPO}}"
        remoteChart: schema-registration
        namespace: "{{.IDENTITY_NAMESPACE}}"
        wait: true
        valuesFiles:
          - infra/helm/identity-schema-registration/values.yaml

      # --- Ory Infrastructure (vendored in mathtrail-charts) ---
      - name: kratos
        repo: "{{.CHARTS_REPO}}"
        remoteChart: kratos
        namespace: "{{.IDENTITY_NAMESPACE}}"
        createNamespace: true
        valuesFiles:
          - values/kratos-values.yaml
        wait: true

      - name: hydra
        repo: "{{.CHARTS_REPO}}"
        remoteChart: hydra
        namespace: "{{.IDENTITY_NAMESPACE}}"
        valuesFiles:
          - values/hydra-values.yaml
        wait: true

      - name: keto
        repo: "{{.CHARTS_REPO}}"
        remoteChart: keto
        namespace: "{{.IDENTITY_NAMESPACE}}"
        valuesFiles:
          - values/keto-values.yaml
        wait: true

      - name: oathkeeper
        repo: "{{.CHARTS_REPO}}"
        remoteChart: oathkeeper
        namespace: "{{.IDENTITY_NAMESPACE}}"
        valuesFiles:
          - values/oathkeeper-values.yaml
        wait: true

      # --- CDC setup (must run after Kratos migrations create source tables) ---
      - name: identity-cdc-setup
        repo: "{{.CHARTS_REPO}}"
        remoteChart: risingwave-cdc-setup
        namespace: "{{.IDENTITY_NAMESPACE}}"
        wait: true
        valuesFiles:
          - infra/helm/identity-cdc-setup/values.yaml

      # --- Identity UI (custom service, library chart) ---
      - name: identity-ui
        chartPath: infra/helm/identity-ui
        namespace: "{{.IDENTITY_NAMESPACE}}"
        wait: true
        valuesFiles:
          - infra/helm/identity-ui/values.yaml
          - infra/helm/values-dev.yaml
        setValueTemplates:
          image.repository: "{{.IMAGE_REPO_identity_ui}}"
          image.tag: "{{.IMAGE_TAG_identity_ui}}"

      # --- Hydra client registration (post-Hydra deploy, idempotent) ---
      - name: identity-hydra-clients
        chartPath: infra/helm/identity-hydra-clients
        namespace: "{{.IDENTITY_NAMESPACE}}"
        wait: true

portForward:
  - resourceType: service
    resourceName: kratos-public
    namespace: "{{.IDENTITY_NAMESPACE}}"
    port: 80
    localPort: 4433
  - resourceType: service
    resourceName: kratos-admin
    namespace: "{{.IDENTITY_NAMESPACE}}"
    port: 80
    localPort: 4434
  - resourceType: service
    resourceName: hydra-public
    namespace: "{{.IDENTITY_NAMESPACE}}"
    port: 4444
    localPort: 4444
  - resourceType: service
    resourceName: hydra-admin
    namespace: "{{.IDENTITY_NAMESPACE}}"
    port: 4445
    localPort: 4445
  - resourceType: service
    resourceName: keto-read
    namespace: "{{.IDENTITY_NAMESPACE}}"
    port: 80
    localPort: 4466
  - resourceType: service
    resourceName: keto-write
    namespace: "{{.IDENTITY_NAMESPACE}}"
    port: 80
    localPort: 4467
  - resourceType: service
    resourceName: oathkeeper-proxy
    namespace: "{{.IDENTITY_NAMESPACE}}"
    port: 4455
    localPort: 4455
  - resourceType: service
    resourceName: oathkeeper-api
    namespace: "{{.IDENTITY_NAMESPACE}}"
    port: 4456
    localPort: 4456
  - resourceType: service
    resourceName: identity-ui
    namespace: "{{.IDENTITY_NAMESPACE}}"
    port: 8080
    localPort: 8090

requires:
  - configs:
      - identity-local-deps

---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: identity-local-deps

build:
  artifacts: []

manifests:
  rawYaml:
    - infra/local/manifests/mock-oauth2-server.yaml

deploy:
  statusCheck: true
  kubectl:
    defaultNamespace: "{{.IDENTITY_NAMESPACE}}"
  helm:
    releases:
      - name: identity-postgres
        namespace: "{{.IDENTITY_NAMESPACE}}"
        chartPath: infra/local/helm/identity-postgres
        createNamespace: true
        wait: true
        skipBuildDependencies: true

      - name: identity-pgbouncer
        namespace: "{{.IDENTITY_NAMESPACE}}"
        chartPath: infra/local/helm/identity-pgbouncer
        createNamespace: true
        wait: true
        skipBuildDependencies: true

---
# Installs k6-operator (idempotent). Run once before load tests.
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: identity-load-deps

build:
  artifacts: []

deploy:
  statusCheck: true
  statusCheckDeadlineSeconds: 120
  helm:
    releases:
      - name: k6-operator
        namespace: k6-operator-system
        repo: "{{.CHARTS_REPO}}"
        remoteChart: k6-operator
        wait: true

---
# Deploys the k6 TestRun for registration load testing.
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: identity-load-tests

build:
  artifacts: []

deploy:
  helm:
    releases:
      - name: identity-registration-load-test
        namespace: "{{.IDENTITY_NAMESPACE}}"
        repo: "{{.CHARTS_REPO}}"
        remoteChart: k6-test-runner
        createNamespace: true
        setValues:
          parallelism: 1
        setValueTemplates:
          extraEnv[0].name: KRATOS_URL
          extraEnv[0].value: http://kratos-public
        setFiles:
          loadTestScript: tests/load/dist/bundle.js
