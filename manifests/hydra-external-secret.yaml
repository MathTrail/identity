# Pulls Hydra OAuth2 signing secrets from Vault KV into a K8s Secret.
# Hydra chart uses this Secret via: secret.enabled=false, secret.nameOverride=hydra-external-secret
# Keys match what Hydra deployment expects: secretsSystem, secretsCookie
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hydra-external-secret
  namespace: identity
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv-backend
    kind: ClusterSecretStore
  target:
    name: hydra-external-secret
    creationPolicy: Owner
  data:
    - secretKey: secretsSystem
      remoteRef:
        key: secret/data/local/mathtrail-identity/hydra
        property: system_secret
    - secretKey: secretsCookie
      remoteRef:
        key: secret/data/local/mathtrail-identity/hydra
        property: cookie_secret
