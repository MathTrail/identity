# Pulls Google OAuth2 credentials from Vault KV into a K8s Secret.
# Kratos reads GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET from this Secret
# via deployment.extraEnv in kratos-values.yaml.
# Vault path: secret/data/{env}/mathtrail-identity/kratos
#   keys: google_client_id, google_client_secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kratos-google-oidc
  namespace: identity
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv-backend
    kind: ClusterSecretStore
  target:
    name: kratos-google-oidc
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: secret/data/local/mathtrail-identity/kratos
        property: google_client_id
    - secretKey: client_secret
      remoteRef:
        key: secret/data/local/mathtrail-identity/kratos
        property: google_client_secret
