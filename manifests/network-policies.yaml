# NetworkPolicies for the mathtrail namespace
# Controls egress from Oathkeeper and other mathtrail services to monitoring.

---
# Allow Oathkeeper to forward proxied requests to Grafana and Pyroscope in monitoring
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-oathkeeper-monitoring-egress
  namespace: identity
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: oathkeeper
  policyTypes:
    - Egress
  egress:
    # Forward proxied requests to Identity UI (auth, health routes)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: identity-ui
      ports:
        - protocol: TCP
          port: 8080
    # Forward proxied requests to Mentor API (api, swagger routes) in mathtrail namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mathtrail
      ports:
        - protocol: TCP
          port: 8080
    # Kratos session validation (intra-namespace)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kratos
      ports:
        - protocol: TCP
          port: 4433  # kratos-public
    # Keto relation-tuple check (intra-namespace)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keto
      ports:
        - protocol: TCP
          port: 4466  # keto-read
    # Forward to Grafana and Pyroscope in monitoring namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 80    # Grafana HTTP
        - protocol: TCP
          port: 4040  # Pyroscope
    # Forward to streaming UIs (Kafka UI, Apicurio, EventCatalog, MinIO Console)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: streaming
      ports:
        - protocol: TCP
          port: 8080  # Kafka UI, Apicurio, EventCatalog
        - protocol: TCP
          port: 9001  # MinIO Console
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
