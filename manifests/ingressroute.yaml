# IngressRoute: single entry point → Oathkeeper proxy (auth/authz).
# Traefik applies middlewares (rate limit, CB, security headers),
# Oathkeeper routes further to identity-ui, mentor-api, Grafana, Pyroscope.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mathtrail
  namespace: kube-system
spec:
  entryPoints:
    - websecure
  routes:
    # Kratos + Hydra Admin API — proxied via identity-ui nginx (same-origin cookies)
    # Must come BEFORE the generic /api/ rule
    - match: Host(`mathtrail.localhost`) && PathPrefix(`/api/kratos/`)
      kind: Rule
      services:
        - name: identity-ui
          namespace: identity
          port: 8080

    - match: Host(`mathtrail.localhost`) && PathPrefix(`/api/hydra-admin/`)
      kind: Rule
      services:
        - name: identity-ui
          namespace: identity
          port: 8080

    # Auth endpoints — strict rate limit (brute-force protection)
    - match: Host(`mathtrail.localhost`) && PathPrefix(`/auth/`)
      kind: Rule
      middlewares:
        - name: rate-limit-auth
          namespace: kube-system
        - name: security-headers
          namespace: kube-system
      services:
        - name: oathkeeper-proxy
          namespace: identity
          port: 4455
          serversTransport: oathkeeper-transport

    # API and Swagger — relaxed rate limit + circuit breaker
    - match: Host(`mathtrail.localhost`) && (PathPrefix(`/api/`) || PathPrefix(`/swagger/`))
      kind: Rule
      middlewares:
        - name: rate-limit-api
          namespace: kube-system
        - name: circuit-breaker
          namespace: kube-system
        - name: security-headers
          namespace: kube-system
      services:
        - name: oathkeeper-proxy
          namespace: identity
          port: 4455
          serversTransport: oathkeeper-transport

    # Observability — Keto authorization check is performed inside Oathkeeper
    - match: Host(`mathtrail.localhost`) && PathPrefix(`/observability/`)
      kind: Rule
      middlewares:
        - name: rate-limit-api
          namespace: kube-system
        - name: security-headers
          namespace: kube-system
      services:
        - name: oathkeeper-proxy
          namespace: identity
          port: 4455
          serversTransport: oathkeeper-transport

    # Health — no auth or rate limit (required for liveness/readiness probes)
    - match: Host(`mathtrail.localhost`) && PathPrefix(`/health/`)
      kind: Rule
      services:
        - name: oathkeeper-proxy
          namespace: identity
          port: 4455

    # SPA catch-all — static assets (/assets/, /favicon.ico, etc.)
    # Must be last (least specific). No rate-limit to avoid throttling asset loads.
    - match: Host(`mathtrail.localhost`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: identity-ui
          namespace: identity
          port: 8080
  tls:
    secretName: mathtrail-tls-secret

---
# HTTP-only route for Google OIDC callback.
# Google rejects .localhost TLD; http://localhost is their explicit dev exception.
# Kratos base_url stays https://mathtrail.localhost/api/kratos/ (for SPA flows),
# but Google redirects the user's browser to http://localhost/api/kratos/...
# Kratos --dev mode disables CSRF so the origin difference doesn't break flows.
# Route goes directly to kratos-public (port 80) to preserve the /self-service/
# path as-is — identity-ui nginx strips the /api/kratos/ prefix before forwarding.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mathtrail-oidc-callback
  namespace: kube-system
spec:
  entryPoints:
    - web
  routes:
    # All /api/kratos/ traffic on http://localhost — needed because with base_url=http://localhost/api/kratos/
    # Kratos generates form action URLs like http://localhost/api/kratos/self-service/login?flow=xxx.
    # Goes to identity-ui nginx which proxies to kratos-public (same as the HTTPS path).
    - match: Host(`localhost`) && PathPrefix(`/api/kratos/`)
      kind: Rule
      services:
        - name: identity-ui
          namespace: identity
          port: 8080
