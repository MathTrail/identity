{{- $v := include "mathtrail-service-lib.mergedValues" . | fromYaml }}
{{- if $v.risingwaveCdc.enabled }}
# PostgreSQL CDC replication user credentials for RisingWave.
# Synced from Vault KV into this namespace so the RisingWave CDC Job can mount them.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: risingwave-pg-creds
  labels:
    {{- include "mathtrail-service-lib.labels" . | nindent 4 }}
    app.kubernetes.io/component: risingwave-cdc
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv-backend
    kind: ClusterSecretStore
  target:
    name: risingwave-pg-creds
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: local/streaming-risingwave-pg-creds
        property: username
    - secretKey: password
      remoteRef:
        key: local/streaming-risingwave-pg-creds
        property: password
---
# AutoMQ SCRAM credentials for the RisingWave CDC sink.
# Synced from Vault KV into this namespace so the RisingWave CDC Job can mount them.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: risingwave-automq-scram
  labels:
    {{- include "mathtrail-service-lib.labels" . | nindent 4 }}
    app.kubernetes.io/component: risingwave-cdc
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv-backend
    kind: ClusterSecretStore
  target:
    name: risingwave-automq-scram
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: local/streaming-automq-risingwave
        property: username
    - secretKey: password
      remoteRef:
        key: local/streaming-automq-risingwave
        property: password
{{- end }}
