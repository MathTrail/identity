db:
  postgresHost: postgres-postgresql
  databases:
    - name: kratos
      vaultPrivileges: false
    - name: hydra
      vaultPrivileges: false
    - name: keto
      vaultPrivileges: false

# Apicurio schema registration — registers Protobuf schemas produced by the identity domain.
# These schemas are emitted via CDC (RisingWave watching Kratos Postgres tables).
# Source of truth for schema definitions: D:\Projects\MathTrail\contracts\proto\
schemaRegistration:
  enabled: true
  apicurioUrl: "http://apicurio.streaming.svc.cluster.local:8080"
  hookWeight: "8"
  schemas:
    - subject: "identity.v1.UserCreated"
      # Source: contracts/proto/identity/v1/events.proto
      # Self-contained (no imports) — if imports are added, Job must use references API
      proto: |
        syntax = "proto3";
        package identity.v1;
        option go_package = "github.com/mathtrail/contracts/gen/go/identity/v1;identityv1";
        message UserCreated {
          string event_id    = 1;
          string identity_id = 2;
          string schema_id   = 3;
          string state       = 4;
          string created_at  = 5;
          string op          = 6;
          string ts_ms       = 7;
        }
    - subject: "identity.v1.AddressCreated"
      # Source: contracts/proto/identity/v1/events.proto
      proto: |
        syntax = "proto3";
        package identity.v1;
        option go_package = "github.com/mathtrail/contracts/gen/go/identity/v1;identityv1";
        message AddressCreated {
          string event_id    = 1;
          string address_id  = 2;
          string identity_id = 3;
          string value       = 4;
          string via         = 5;
          string verified    = 6;
          string created_at  = 7;
          string op          = 8;
        }

# RisingWave CDC pipeline — owned by identity-api (Kratos PostgreSQL is the CDC source).
# Credentials are synced into this namespace via ESO ExternalSecrets (eso-risingwave-secrets.yaml).
# Source of truth for streaming SQL: this file.
#
# IDEMPOTENCY: CREATE SOURCE/TABLE/SINK IF NOT EXISTS are safe on every upgrade.
# EXCEPTION: If the MATERIALIZED VIEW definition changes, first run manually:
#   DROP MATERIALIZED VIEW students_onboarding_ready CASCADE;
#   (this also drops students_onboarding_sink — recreate both via next Helm upgrade)
risingwaveCdc:
  enabled: true
  hookWeight: "10"
  pgSource:
    host: "kratos-postgresql"
    port: "5432"
    database: "kratos"
    credentialsSecret: "risingwave-pg-creds"
    slotName: "risingwave_cdc"
    publicationName: "risingwave_pub"
    tables:
      - "public.identities"
      - "public.identity_verifiable_addresses"
  risingwave:
    host: "risingwave-frontend.streaming.svc.cluster.local"
    port: "4566"
    user: "root"
    database: "dev"
  automq:
    bootstrapServer: "automq.streaming.svc.cluster.local:9092"
    credentialsSecret: "risingwave-automq-scram"
  apicurioUrl: "http://apicurio.streaming.svc.cluster.local:8080/apis/ccompat/v7"
  sql: |
    -- 1. CDC Source — connects to Kratos PostgreSQL via native CDC
    -- Uses replication slot 'risingwave_cdc' and publication 'risingwave_pub'
    -- (both created by the cdc-pg-setup initContainer)
    CREATE SOURCE IF NOT EXISTS kratos_pg_cdc WITH (
        connector          = 'postgres-cdc',
        hostname           = '${PG_HOST}',
        port               = '${PG_PORT}',
        username           = '${PG_USER}',
        password           = '${PG_PASSWORD}',
        database.name      = '${PG_DATABASE}',
        schema.name        = 'public',
        slot.name          = 'risingwave_cdc',
        publication.name   = 'risingwave_pub'
    );

    -- 2. CDC Tables — expose Postgres tables as RisingWave streaming tables
    --    Column list must match the actual Kratos schema.
    CREATE TABLE IF NOT EXISTS identities (
        id          VARCHAR,
        schema_id   VARCHAR,
        state       VARCHAR,
        traits      JSONB,       -- first_name / last_name live here
        created_at  TIMESTAMPTZ,
        updated_at  TIMESTAMPTZ,
        PRIMARY KEY (id)
    ) FROM kratos_pg_cdc TABLE 'public.identities';

    CREATE TABLE IF NOT EXISTS identity_verifiable_addresses (
        id          VARCHAR,
        identity_id VARCHAR,
        value       VARCHAR,     -- email address
        via         VARCHAR,     -- 'email'
        verified    BOOLEAN,
        created_at  TIMESTAMPTZ,
        PRIMARY KEY (id)
    ) FROM kratos_pg_cdc TABLE 'public.identity_verifiable_addresses';

    -- 3. Materialized View — join CDC tables, produce StudentOnboardingReady event
    --
    --    IMPORTANT: traits structure matches Kratos identity schema (identity.schema.json).
    --    Traits are stored as: {"email": "...", "name": {"first": "...", "last": "..."}, "role": "..."}
    --    Verify against: SELECT traits FROM identities LIMIT 1;
    CREATE MATERIALIZED VIEW IF NOT EXISTS students_onboarding_ready AS
    SELECT
        gen_random_uuid()::VARCHAR      AS event_id,
        i.id                            AS user_id,
        iva.value                       AS email,
        i.traits->'name'->>'first'      AS first_name,
        i.traits->'name'->>'last'       AS last_name,
        'student'                       AS role,
        NOW()::VARCHAR                  AS occurred_at,
        MAP {
            'ce-specversion': '1.0',
            'ce-type':        'com.mathtrail.students.onboarding.ready',
            'ce-source':      '/mathtrail/risingwave',
            'ce-id':          gen_random_uuid()::VARCHAR,
            'ce-time':        to_char(NOW() AT TIME ZONE 'UTC', 'YYYY-MM-DD"T"HH24:MI:SS"Z"')
        }                               AS _headers
    FROM identities i
    JOIN identity_verifiable_addresses iva
      ON iva.identity_id = i.id
    WHERE iva.via = 'email'
      AND i.state = 'active';

    -- 4. Kafka Sink → AutoMQ
    --    FORMAT PLAIN ENCODE PROTOBUF: produces Confluent Wire Format bytes
    --    schema_id resolved from Apicurio ccompat API by subject name.
    CREATE SINK IF NOT EXISTS students_onboarding_sink
    FROM students_onboarding_ready
    WITH (
        connector                          = 'kafka',
        properties.bootstrap.server        = '${AUTOMQ_BOOTSTRAP_SERVER}',
        topic                              = 'students.onboarding.ready',
        properties.sasl.mechanism          = 'SCRAM-SHA-512',
        properties.security.protocol       = 'SASL_PLAINTEXT',
        properties.sasl.jaas.config        = 'org.apache.kafka.common.security.scram.ScramLoginModule required username="${AUTOMQ_USERNAME}" password="${AUTOMQ_PASSWORD}";'
    )
    FORMAT PLAIN ENCODE PROTOBUF (
        schema.registry = '${APICURIO_URL}',
        message         = 'students.v1.StudentOnboardingReady'
    );
