db:
  postgresHost: postgres-postgresql
  databases:
    - name: kratos
      vaultPrivileges: false
    - name: hydra
      vaultPrivileges: false
    - name: keto
      vaultPrivileges: false

# Apicurio schema registration — registers Protobuf schemas produced by the identity domain.
# These schemas are emitted via CDC (RisingWave watching Kratos Postgres tables).
# Source of truth for schema definitions: D:\Projects\MathTrail\contracts\proto\
schemaRegistration:
  enabled: true
  apicurioUrl: "http://apicurio.streaming.svc.cluster.local:8080"
  hookWeight: "8"
  schemas:
    - subject: "identity.v1.UserCreated"
      # Source: contracts/proto/identity/v1/events.proto
      # Self-contained (no imports) — if imports are added, Job must use references API
      proto: |
        syntax = "proto3";
        package identity.v1;
        option go_package = "github.com/mathtrail/contracts/gen/go/identity/v1;identityv1";
        message UserCreated {
          string event_id    = 1;
          string identity_id = 2;
          string schema_id   = 3;
          string state       = 4;
          string created_at  = 5;
          string op          = 6;
          string ts_ms       = 7;
        }
    - subject: "identity.v1.AddressCreated"
      # Source: contracts/proto/identity/v1/events.proto
      proto: |
        syntax = "proto3";
        package identity.v1;
        option go_package = "github.com/mathtrail/contracts/gen/go/identity/v1;identityv1";
        message AddressCreated {
          string event_id    = 1;
          string address_id  = 2;
          string identity_id = 3;
          string value       = 4;
          string via         = 5;
          string verified    = 6;
          string created_at  = 7;
          string op          = 8;
        }
