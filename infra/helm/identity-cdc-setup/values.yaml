# =======================================================================
# identity-cdc-setup :: values.yaml
# RisingWave CDC pipeline for the identity domain.
# Source: Kratos PostgreSQL (identities + identity_verifiable_addresses tables)
# Sink:   AutoMQ → students.onboarding.ready topic
#
# Credentials are provisioned by identity-db-init via eso-risingwave-secrets.yaml:
#   risingwave-pg-creds      — PostgreSQL replication user (Vault KV: local/streaming-risingwave-pg-creds)
#   risingwave-automq-scram  — AutoMQ SCRAM credentials (Vault KV: local/streaming-automq-risingwave)
#
# IDEMPOTENCY: CREATE SOURCE/TABLE/SINK IF NOT EXISTS are safe on every upgrade.
# EXCEPTION: If the MATERIALIZED VIEW definition changes, first run manually:
#   DROP MATERIALIZED VIEW students_onboarding_ready CASCADE;
#   (this also drops students_onboarding_sink — recreate both via next Helm upgrade)
# =======================================================================

pgSource:
  host: "identity-postgres-postgresql.identity.svc.cluster.local"
  port: "5432"
  database: "kratos"
  credentialsSecret: "risingwave-pg-creds"
  slotName: "risingwave_cdc"
  publicationName: "risingwave_pub"
  tables:
    - "public.identities"
    - "public.identity_verifiable_addresses"

risingwave:
  host: "risingwave-frontend.streaming.svc.cluster.local"
  port: "4566"
  user: "root"
  database: "dev"

automq:
  bootstrapServer: "streaming-automq-kafka.streaming.svc.cluster.local:9092"
  credentialsSecret: "risingwave-automq-scram"

apicurioUrl: "http://streaming-apicurio-apicurio-registry.streaming.svc.cluster.local:8080/apis/ccompat/v7"

sql: |
  -- 1. CDC Source — connects to Kratos PostgreSQL via native CDC
  -- Uses replication slot 'risingwave_cdc' and publication 'risingwave_pub'
  -- (both created by the cdc-pg-setup initContainer)
  CREATE SOURCE IF NOT EXISTS kratos_pg_cdc WITH (
      connector          = 'postgres-cdc',
      hostname           = '${PG_HOST}',
      port               = '${PG_PORT}',
      username           = '${PG_USER}',
      password           = '${PG_PASSWORD}',
      database.name      = '${PG_DATABASE}',
      schema.name        = 'public',
      slot.name          = 'risingwave_cdc',
      publication.name   = 'risingwave_pub'
  );

  -- 2. CDC Tables — expose Postgres tables as RisingWave streaming tables
  --    Column list must match the actual Kratos schema.
  CREATE TABLE IF NOT EXISTS identities (
      id          VARCHAR,
      schema_id   VARCHAR,
      state       VARCHAR,
      traits      JSONB,       -- first_name / last_name live here
      created_at  TIMESTAMP,
      updated_at  TIMESTAMP,
      PRIMARY KEY (id)
  ) FROM kratos_pg_cdc TABLE 'public.identities';

  CREATE TABLE IF NOT EXISTS identity_verifiable_addresses (
      id          VARCHAR,
      identity_id VARCHAR,
      value       VARCHAR,     -- email address
      via         VARCHAR,     -- 'email'
      verified    BOOLEAN,
      created_at  TIMESTAMP,
      PRIMARY KEY (id)
  ) FROM kratos_pg_cdc TABLE 'public.identity_verifiable_addresses';

  -- 3. Drop sink and MV before recreating with the new schema
  DROP SINK IF EXISTS students_onboarding_sink;
  DROP MATERIALIZED VIEW IF EXISTS students_onboarding_ready CASCADE;

  -- 4. Materialized View — join CDC tables, produce StudentOnboardingReady event
  --
  --    IMPORTANT: traits structure matches Kratos identity schema (identity.schema.json).
  --    Traits are stored as: {"email": "...", "name": {"first": "...", "last": "..."}, "role": "..."}
  --    Verify against: SELECT traits FROM identities LIMIT 1;
  --
  --    NOTE: gen_random_uuid() and NOW() in SELECT are not available in RisingWave streaming MVs.
  --    event_id is derived deterministically from identity + address IDs via md5().
  --    occurred_at uses i.created_at (the source record timestamp).
  CREATE MATERIALIZED VIEW IF NOT EXISTS students_onboarding_ready AS
  SELECT
      md5(i.id || iva.id)             AS event_id,
      i.id                            AS user_id,
      iva.value                       AS email,
      i.traits->'name'->>'first'      AS first_name,
      i.traits->'name'->>'last'       AS last_name,
      'student'                       AS role,
      i.created_at::VARCHAR           AS occurred_at
  FROM identities i
  JOIN identity_verifiable_addresses iva
    ON iva.identity_id = i.id
  WHERE iva.via = 'email'
    AND i.state = 'active';

  -- 5. Kafka Sink → AutoMQ
  --    FORMAT PLAIN ENCODE PROTOBUF: produces Confluent Wire Format bytes
  --    RisingWave resolves schema by subject '{topic}-value' (TopicNameStrategy, hardcoded).
  --    schema.registry.name.strategy is NOT supported in this RisingWave build —
  --    the connector always requests 'students.onboarding.ready-value' from Apicurio.
  --    force_append_only='true': required because JOIN produces a retract stream;
  --    DELETE/UPDATE events are dropped (onboarding is an insert-only event).
  --    NOTE: AutoMQ local dev uses PLAINTEXT listener — no SASL required.
  CREATE SINK IF NOT EXISTS students_onboarding_sink
  FROM students_onboarding_ready
  WITH (
      connector                   = 'kafka',
      properties.bootstrap.server = '${AUTOMQ_BOOTSTRAP_SERVER}',
      topic                       = 'students.onboarding.ready'
  )
  FORMAT PLAIN ENCODE PROTOBUF (
      schema.registry   = '${APICURIO_URL}',
      message           = 'students.v1.StudentOnboardingReady',
      force_append_only = 'true'
  );
