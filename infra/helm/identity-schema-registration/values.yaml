# =======================================================================
# identity-schema-registration :: values.yaml
# Registers Protobuf schemas produced by the identity domain into Apicurio Registry.
# These schemas are emitted via CDC (RisingWave watching Kratos Postgres tables).
# Source of truth for schema definitions: contracts/proto/identity/v1/events.proto
# =======================================================================

apicurioUrl: "http://streaming-apicurio-apicurio-registry.streaming.svc.cluster.local:8080"
hookWeight: "8"

schemas:
  - subject: "identity.v1.UserCreated"
    # Source: contracts/proto/identity/v1/events.proto
    # Self-contained (no imports) — if imports are added, Job must use references API
    proto: |
      syntax = "proto3";
      package identity.v1;
      option go_package = "github.com/mathtrail/contracts/gen/go/identity/v1;identityv1";
      message UserCreated {
        string event_id    = 1;
        string identity_id = 2;
        string schema_id   = 3;
        string state       = 4;
        string created_at  = 5;
        string op          = 6;
        string ts_ms       = 7;
      }

  - subject: "identity.v1.AddressCreated"
    # Source: contracts/proto/identity/v1/events.proto
    proto: |
      syntax = "proto3";
      package identity.v1;
      option go_package = "github.com/mathtrail/contracts/gen/go/identity/v1;identityv1";
      message AddressCreated {
        string event_id    = 1;
        string address_id  = 2;
        string identity_id = 3;
        string value       = 4;
        string via         = 5;
        string verified    = 6;
        string created_at  = 7;
        string op          = 8;
      }

  - subject: "students.onboarding.ready-value"
    # Source: contracts/proto/students/v1/events.proto
    # Produced by: RisingWave CDC sink (topic: students.onboarding.ready)
    # Consumed by: mentor-api
    proto: |
      syntax = "proto3";
      package students.v1;
      option go_package = "github.com/mathtrail/contracts/gen/go/students/v1;studentsv1";
      message StudentOnboardingReady {
        string event_id   = 1;
        string user_id    = 2;
        string email      = 3;
        string first_name = 4;
        string last_name  = 5;
        string role       = 6;
        string occurred_at = 7;
      }
