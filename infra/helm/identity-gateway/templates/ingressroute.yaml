# IngressRoute: single entry point → Oathkeeper proxy (auth/authz).
# Traefik applies middlewares (rate limit, CB, security headers),
# Oathkeeper routes further to identity-ui, mentor-api, Grafana, Pyroscope.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mathtrail
  namespace: {{ .Values.identityNamespace }}
spec:
  entryPoints:
    - websecure
  routes:
    # Kratos + Hydra Admin API — proxied via identity-ui nginx (same-origin cookies)
    # priority: 200 ensures these win over the generic /api/ rule (Traefik picks by rule string length)
    - match: Host(`{{ .Values.hostname }}`) && PathPrefix(`/api/kratos/`)
      kind: Rule
      priority: 200
      services:
        - name: identity-ui
          port: 8080

    - match: Host(`{{ .Values.hostname }}`) && PathPrefix(`/api/hydra-admin/`)
      kind: Rule
      priority: 200
      services:
        - name: identity-ui
          port: 8080

    # Auth endpoints — strict rate limit (brute-force protection)
    - match: Host(`{{ .Values.hostname }}`) && PathPrefix(`/auth/`)
      kind: Rule
      middlewares:
        - name: rate-limit-auth
        - name: security-headers
      services:
        - name: oathkeeper-proxy
          port: 4455

    # Static assets (JS, CSS) served by identity-ui via Oathkeeper
    - match: Host(`{{ .Values.hostname }}`) && PathPrefix(`/assets/`)
      kind: Rule
      services:
        - name: oathkeeper-proxy
          port: 4455

    # API and Swagger — relaxed rate limit + circuit breaker
    - match: Host(`{{ .Values.hostname }}`) && (PathPrefix(`/api/`) || PathPrefix(`/swagger/`))
      kind: Rule
      middlewares:
        - name: rate-limit-api
        - name: circuit-breaker
        - name: security-headers
      services:
        - name: oathkeeper-proxy
          port: 4455

    # MinIO redirect — /observability/minio → minio.mathtrail.localhost subdomain.
    # MinIO Console's JS hardcodes /api/v1 which conflicts with mentor-api; subdomain isolates it.
    - match: Host(`{{ .Values.hostname }}`) && PathPrefix(`/observability/minio`)
      kind: Rule
      priority: 200
      middlewares:
        - name: redirect-minio-subdomain
      services:
        - name: oathkeeper-proxy
          port: 4455

    # EventCatalog trailing-slash redirect — Next.js 301s to cluster-internal URL without it.
    - match: Host(`{{ .Values.hostname }}`) && Path(`/observability/eventcatalog`)
      kind: Rule
      priority: 200
      middlewares:
        - name: redirect-eventcatalog-slash
      services:
        - name: oathkeeper-proxy
          port: 4455

    # Apicurio root redirect — higher priority than generic /observability/ rule.
    # Apicurio 3.x (Quarkus) redirects / → /apis using its cluster-internal URL;
    # we catch the bare root path here and redirect to /apis before it reaches the backend.
    - match: Host(`{{ .Values.hostname }}`) && PathRegexp(`^/observability/apicurio/?$`)
      kind: Rule
      priority: 200
      middlewares:
        - name: redirect-apicurio-root
      services:
        - name: oathkeeper-proxy
          port: 4455

    # Apicurio raw paths — Apicurio HTML has <base href="/"> so its links resolve at root.
    # /apis/... API doc/UI; /resources/... static CSS/JS; /api-specifications/... OpenAPI JSON specs.
    # All proxied to Oathkeeper which forwards to Apicurio without stripping.
    - match: Host(`{{ .Values.hostname }}`) && (PathPrefix(`/apis`) || PathPrefix(`/resources`) || PathPrefix(`/api-specifications`))
      kind: Rule
      middlewares:
        - name: rate-limit-api
        - name: security-headers
      services:
        - name: oathkeeper-proxy
          port: 4455

    # Observability — Keto authorization check is performed inside Oathkeeper
    - match: Host(`{{ .Values.hostname }}`) && PathPrefix(`/observability/`)
      kind: Rule
      middlewares:
        - name: rate-limit-api
        - name: security-headers
      services:
        - name: oathkeeper-proxy
          port: 4455

    # Health — no auth or rate limit (required for liveness/readiness probes)
    - match: Host(`{{ .Values.hostname }}`) && PathPrefix(`/health/`)
      kind: Rule
      services:
        - name: oathkeeper-proxy
          port: 4455

    # SPA catch-all — must be last (least specific).
    - match: Host(`{{ .Values.hostname }}`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: identity-ui
          port: 8080
  tls:
    secretName: mathtrail-tls-secret
---
# MinIO Console subdomain: minio.mathtrail.localhost → Oathkeeper → MinIO Console.
# Separate host avoids /api/v1 conflict with mentor-api on the main domain.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mathtrail-minio
  namespace: {{ .Values.identityNamespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`minio.{{ .Values.hostname }}`)
      kind: Rule
      middlewares:
        - name: rate-limit-api
        - name: security-headers
      services:
        - name: oathkeeper-proxy
          port: 4455
  tls:
    secretName: mathtrail-tls-secret
---
# Relay: Google OIDC callback arrives on https://localhost/... (Traefik upgrades all HTTP→HTTPS).
# Cookies are set for mathtrail.localhost, not localhost — Kratos rejects the callback without them.
# This middleware redirects the callback to mathtrail.localhost preserving path+query so the
# browser re-sends the request with its mathtrail.localhost cookies.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oidc-callback-relay
  namespace: {{ .Values.identityNamespace }}
spec:
  redirectRegex:
    regex: "^https://localhost(/api/kratos/self-service/methods/oidc/callback/.*)"
    replacement: "https://{{ .Values.hostname }}${1}"
    permanent: false
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mathtrail-oidc-callback
  namespace: {{ .Values.identityNamespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`localhost`) && PathPrefix(`/api/kratos/self-service/methods/oidc/callback/`)
      kind: Rule
      middlewares:
        - name: oidc-callback-relay
      services:
        - name: identity-ui
          port: 8080
  tls:
    secretName: mathtrail-tls-secret
