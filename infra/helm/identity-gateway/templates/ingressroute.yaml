# IngressRoute: single entry point → Oathkeeper proxy (auth/authz).
# Traefik applies middlewares (rate limit, CB, security headers),
# Oathkeeper routes further to identity-ui, mentor-api, Grafana, Pyroscope.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mathtrail
  namespace: {{ .Values.identityNamespace }}
spec:
  entryPoints:
    - websecure
  routes:
    # Kratos + Hydra Admin API — proxied via identity-ui nginx (same-origin cookies)
    # priority: 200 ensures these win over the generic /api/ rule (Traefik picks by rule string length)
    - match: Host(`{{ .Values.hostname }}`) && PathPrefix(`/api/kratos/`)
      kind: Rule
      priority: 200
      services:
        - name: identity-ui
          port: 8080

    - match: Host(`{{ .Values.hostname }}`) && PathPrefix(`/api/hydra-admin/`)
      kind: Rule
      priority: 200
      services:
        - name: identity-ui
          port: 8080

    # Auth endpoints — strict rate limit (brute-force protection)
    - match: Host(`{{ .Values.hostname }}`) && PathPrefix(`/auth/`)
      kind: Rule
      middlewares:
        - name: rate-limit-auth
        - name: security-headers
      services:
        - name: oathkeeper-proxy
          port: 4455

    # Static assets (JS, CSS) served by identity-ui via Oathkeeper
    - match: Host(`{{ .Values.hostname }}`) && PathPrefix(`/assets/`)
      kind: Rule
      services:
        - name: oathkeeper-proxy
          port: 4455

    # API and Swagger — relaxed rate limit + circuit breaker
    - match: Host(`{{ .Values.hostname }}`) && (PathPrefix(`/api/`) || PathPrefix(`/swagger/`))
      kind: Rule
      middlewares:
        - name: rate-limit-api
        - name: circuit-breaker
        - name: security-headers
      services:
        - name: oathkeeper-proxy
          port: 4455

    # Observability — Keto authorization check is performed inside Oathkeeper
    - match: Host(`{{ .Values.hostname }}`) && PathPrefix(`/observability/`)
      kind: Rule
      middlewares:
        - name: rate-limit-api
        - name: security-headers
      services:
        - name: oathkeeper-proxy
          port: 4455

    # Health — no auth or rate limit (required for liveness/readiness probes)
    - match: Host(`{{ .Values.hostname }}`) && PathPrefix(`/health/`)
      kind: Rule
      services:
        - name: oathkeeper-proxy
          port: 4455

    # SPA catch-all — must be last (least specific).
    - match: Host(`{{ .Values.hostname }}`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: identity-ui
          port: 8080
  tls:
    secretName: mathtrail-tls-secret
---
# Relay: Google OIDC callback arrives on https://localhost/... (Traefik upgrades all HTTP→HTTPS).
# Cookies are set for mathtrail.localhost, not localhost — Kratos rejects the callback without them.
# This middleware redirects the callback to mathtrail.localhost preserving path+query so the
# browser re-sends the request with its mathtrail.localhost cookies.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oidc-callback-relay
  namespace: {{ .Values.identityNamespace }}
spec:
  redirectRegex:
    regex: "^https://localhost(/api/kratos/self-service/methods/oidc/callback/.*)"
    replacement: "https://{{ .Values.hostname }}${1}"
    permanent: false
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mathtrail-oidc-callback
  namespace: {{ .Values.identityNamespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`localhost`) && PathPrefix(`/api/kratos/self-service/methods/oidc/callback/`)
      kind: Rule
      middlewares:
        - name: oidc-callback-relay
      services:
        - name: identity-ui
          port: 8080
  tls:
    secretName: mathtrail-tls-secret
