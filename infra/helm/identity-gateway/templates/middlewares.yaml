# Middlewares for mathtrail.localhost IngressRoute.
# Duplicated from traefik-config (kube-system) into {{ .Values.identityNamespace }}
# because Traefik requires middlewares to be in the same namespace as IngressRoute.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-auth
  namespace: {{ .Values.identityNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  rateLimit:
    average: {{ .Values.rateLimitAuth.average }}
    burst: {{ .Values.rateLimitAuth.burst }}
    period: 1s
    sourceCriterion:
      ipStrategy:
        depth: 1
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit-api
  namespace: {{ .Values.identityNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  rateLimit:
    average: 100
    burst: 200
    period: 1s
    sourceCriterion:
      ipStrategy:
        depth: 1
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: circuit-breaker
  namespace: {{ .Values.identityNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  circuitBreaker:
    expression: ResponseCodeRatio(500, 600, 0, 600) > 0.30
    checkPeriod: 10s
    fallbackDuration: 30s
    recoveryDuration: 10s
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: {{ .Values.identityNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  headers:
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    frameDeny: true
    contentTypeNosniff: true
    browserXssFilter: true
---
# MinIO redirect: /observability/minio is replaced by the minio.mathtrail.localhost subdomain.
# MinIO Console hardcodes /api/v1 and <base href="/"> which conflict with mentor-api at /api/v1.
# A subdomain gives MinIO its own origin so root-relative paths stay on the MinIO host.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-minio-subdomain
  namespace: {{ .Values.identityNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  redirectRegex:
    regex: "^https://{{ .Values.hostname }}/observability/minio(/.*)?"
    replacement: "https://minio.{{ .Values.hostname }}${1}"
    permanent: false
---
# RisingWave page-path rewrite: /page/ → /page/index.html before forwarding to backend.
# Oathkeeper uses path.Join (calls path.Clean) which strips trailing slashes, so Go's FileServer
# in RisingWave meta sees /page (no slash) and 301s to /page/ → infinite redirect loop.
# replacePathRegex rewrites the forwarded path only; the browser URL stays unchanged.
# Regex matches single-segment paths with trailing slash (no dots = not a static asset).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rewrite-risingwave-slash
  namespace: {{ .Values.identityNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  replacePathRegex:
    regex: "^(/[^/.]+)/$"
    replacement: "${1}/index.html"
---
# RisingWave Dashboard subdomain redirect: /observability/risingwave → risingwave.mathtrail.localhost.
# Next.js SPA uses root-relative paths (/_next/static/..., /cluster/, etc.); subdomain gives it its own origin.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-risingwave-subdomain
  namespace: {{ .Values.identityNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  redirectRegex:
    regex: "^https://{{ .Values.hostname }}/observability/risingwave(/.*)?"
    replacement: "https://risingwave.{{ .Values.hostname }}${1}"
    permanent: false
---
# EventCatalog trailing-slash redirect: Next.js returns 301 with the cluster-internal hostname
# when the path lacks a trailing slash. Intercept at Traefik before it reaches the backend.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-eventcatalog-slash
  namespace: {{ .Values.identityNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  redirectRegex:
    regex: "^https://{{ .Values.hostname }}/observability/eventcatalog$"
    replacement: "https://{{ .Values.hostname }}/observability/eventcatalog/"
    permanent: true
---
# RisingWave API forwardAuth: Oathkeeper proxy strips trailing slashes (path.Clean).
# /api/* paths on the risingwave subdomain use forwardAuth (decision API) instead of
# Oathkeeper proxy, so Traefik preserves the trailing slash when forwarding to the backend.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: forwardauth-risingwave
  namespace: {{ .Values.identityNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  forwardAuth:
    address: "http://oathkeeper-api.{{ .Values.identityNamespace }}.svc.cluster.local:4456/decisions"
    trustForwardHeader: true
---
# Apicurio root redirect: / → /apis (the actual UI path in Apicurio 3.x).
# Apicurio generates an absolute redirect using its cluster-internal hostname,
# so we intercept at Traefik before the request reaches Oathkeeper/Apicurio.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-apicurio-root
  namespace: {{ .Values.identityNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  redirectRegex:
    regex: "^https://{{ .Values.hostname }}/observability/apicurio/?$"
    replacement: "https://{{ .Values.hostname }}/observability/apicurio/apis"
    permanent: false
