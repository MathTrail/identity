# TLS certificate for Traefik IngressRoute.
# Dev: internal CA (mathtrail-internal-ca-issuer from cert-manager-config, wave 2).
# Prod: replace issuerRef with letsencrypt ClusterIssuer and dnsNames with the real domain.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mathtrail-tls
  namespace: {{ .Values.identityNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  secretName: mathtrail-tls-secret
  duration: 8760h     # 1 year
  renewBefore: 720h   # 30 days
  dnsNames:
    - {{ .Values.hostname }}
    - localhost
    - minio.{{ .Values.hostname }}
    - risingwave.{{ .Values.hostname }}
    - argocd.{{ .Values.hostname }}
  issuerRef:
    name: {{ .Values.issuerName }}
    kind: ClusterIssuer
