# ExternalSecrets for Kratos and Hydra — must exist before Ory Helm releases.
# identity-gateway deploys first (before kratos/hydra in skaffold.yaml), guaranteeing ordering.
# ESO syncs these from Vault after vault-seed-job writes the credentials.
---
# Generates a ready-to-use Kratos YAML config snippet with real Google credentials.
# Kratos reads this as a second --config file (see kratos-values.yaml deployment.extraArgs).
# ESO template interpolation avoids relying on Kratos's ${VAR} substitution, which
# is not supported for OIDC provider fields in v25.4.0.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kratos-oidc-config
  namespace: {{ .Values.identityNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv-backend
    kind: ClusterSecretStore
  target:
    name: kratos-oidc-config
    creationPolicy: Owner
    template:
      data:
        oidc.yaml: |
          selfservice:
            methods:
              oidc:
                config:
                  providers:
                    - id: google
                      provider: google
                      client_id: "{{"{{"}} .google_client_id {{"}}"}}"
                      client_secret: "{{"{{"}} .google_client_secret {{"}}"}}"
                      mapper_url: file:///etc/config/kratos/oidc.google.jsonnet
                      scope:
                        - openid
                        - email
                        - profile
                    # Mock OIDC provider for local dev load testing (navikt/mock-oauth2-server).
                    # Uses login_hint as OIDC sub so k6 VUs create distinct identities.
                    - id: mock
                      provider: generic
                      client_id: test-client
                      client_secret: test-secret
                      issuer_url: http://mock-oauth2-server:8080/mock
                      mapper_url: file:///etc/config/kratos/oidc.mock.jsonnet
                      scope:
                        - openid
                        - email
                        - profile
  data:
    - secretKey: google_client_id
      remoteRef:
        key: secret/data/local/mathtrail-identity/kratos
        property: google_client_id
    - secretKey: google_client_secret
      remoteRef:
        key: secret/data/local/mathtrail-identity/kratos
        property: google_client_secret
---
# Pulls Hydra OAuth2 signing secrets from Vault KV into a K8s Secret.
# Hydra chart uses this Secret via: secret.enabled=false, secret.nameOverride=hydra-external-secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hydra-external-secret
  namespace: {{ .Values.identityNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv-backend
    kind: ClusterSecretStore
  target:
    name: hydra-external-secret
    creationPolicy: Owner
  data:
    - secretKey: secretsSystem
      remoteRef:
        key: secret/data/local/mathtrail-identity/hydra
        property: system_secret
    - secretKey: secretsCookie
      remoteRef:
        key: secret/data/local/mathtrail-identity/hydra
        property: cookie_secret
    - secretKey: dsn
      remoteRef:
        key: secret/data/local/mathtrail-identity/hydra
        property: dsn
