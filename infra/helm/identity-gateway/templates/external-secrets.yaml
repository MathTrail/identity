# ExternalSecrets for Kratos and Hydra — must exist before Ory Helm releases.
# identity-gateway deploys first (before kratos/hydra in skaffold.yaml), guaranteeing ordering.
# ESO syncs these from Vault after vault-seed-job writes the credentials.
---
# Pulls Google OAuth2 credentials from Vault KV into a K8s Secret.
# Kratos reads GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET from this Secret
# via deployment.extraEnv in kratos-values.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kratos-google-oidc
  namespace: {{ .Values.identityNamespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv-backend
    kind: ClusterSecretStore
  target:
    name: kratos-google-oidc
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: secret/data/local/mathtrail-identity/kratos
        property: google_client_id
    - secretKey: client_secret
      remoteRef:
        key: secret/data/local/mathtrail-identity/kratos
        property: google_client_secret
---
# Pulls Hydra OAuth2 signing secrets from Vault KV into a K8s Secret.
# Hydra chart uses this Secret via: secret.enabled=false, secret.nameOverride=hydra-external-secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hydra-external-secret
  namespace: {{ .Values.identityNamespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv-backend
    kind: ClusterSecretStore
  target:
    name: hydra-external-secret
    creationPolicy: Owner
  data:
    - secretKey: secretsSystem
      remoteRef:
        key: secret/data/local/mathtrail-identity/hydra
        property: system_secret
    - secretKey: secretsCookie
      remoteRef:
        key: secret/data/local/mathtrail-identity/hydra
        property: cookie_secret
