apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-oauth2-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-oauth2-server
  template:
    metadata:
      labels:
        app: mock-oauth2-server
    spec:
      containers:
        - name: mock-oauth2-server
          image: ghcr.io/navikt/mock-oauth2-server:2.1.10
          ports:
            - containerPort: 8080
          env:
            - name: JSON_CONFIG
              value: '{"interactiveLogin": false, "httpServer": "NettyWrapper"}'
---
apiVersion: v1
kind: Service
metadata:
  name: mock-oauth2-server
spec:
  selector:
    app: mock-oauth2-server
  ports:
    - port: 8080
      targetPort: 8080
